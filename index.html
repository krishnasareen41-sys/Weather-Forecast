<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Weather Predictor</title>
    <link rel="icon" href="data:,">
    
    <style>
        /* === CSS Styling === */
        
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
        }

        /* Override body styles - canvas will handle background */
        body {
            background-color: #0a0f1e;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* Canvas for 3D interactive background */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: block;
            z-index: 0;
        }

        /* Content overlay - ensures text and button are above canvas */
        .hero-section {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            text-align: center;
            pointer-events: none; /* Allows clicks to pass through to canvas if needed, but button needs pointer-events auto */
        }

        .auth-wrapper {
            position: relative;
            width: 420px;
            max-width: 90%;
            pointer-events: auto; /* Makes auth interactable */
            animation: fadeInUp 1.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .auth-container {
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            background: rgba(15, 25, 45, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #e0e7ff, #93c5fd);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .auth-subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1rem;
            font-weight: 400;
        }

        .auth-tabs {
            display: flex;
            background: rgba(0, 0, 0, 0.25);
            border-radius: 14px;
            padding: 5px;
            margin-bottom: 2rem;
            position: relative;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            z-index: 1;
            font-size: 0.95rem;
        }

        .auth-tab.active {
            color: #ffffff;
            background: rgba(255, 255, 255, 0.15);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .auth-form {
            display: none;
            flex-direction: column;
            gap: 1.25rem;
            animation: fadeIn 0.4s ease;
        }

        .auth-form.active {
            display: flex;
        }

        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 1.1rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            color: #ffffff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            background: rgba(255, 255, 255, 0.12);
            border-color: #60a5fa;
            box-shadow: 0 0 0 4px rgba(96, 165, 250, 0.2);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        /* Vibrant Glowing Submit Button */
        .submit-btn {
            display: inline-block;
            text-align: center;
            text-decoration: none;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            color: #ffffff;
            font-size: 1.1rem;
            font-weight: 600;
            padding: 1.1rem;
            border-radius: 14px;
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            box-shadow: 0 8px 25px rgba(59,130,246,0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(4px);
            cursor: pointer;
            margin-top: 0.5rem;
            width: 100%;
            pointer-events: auto; /* Ensure button is clickable on all devices */
        }

        .submit-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 30px rgba(99, 102, 241, 0.5);
            background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
            border-color: rgba(255,255,255,0.5);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .auth-wrapper {
                width: 90%;
            }
            .auth-container {
                padding: 2rem;
            }
            .auth-title {
                font-size: 1.8rem;
            }
        }
        
        /* Small devices */
        @media (max-width: 480px) {
            .auth-container {
                padding: 1.5rem;
            }
            .auth-title {
                font-size: 1.6rem;
            }
            .auth-tabs {
                margin-bottom: 1.5rem;
            }
            /* Ensure full‑width on very small screens */
            .auth-wrapper {
                width: 100%;
                max-width: 420px;
            }
        }
    </style>
</head>
<body>

    <!-- Canvas for Three.js 3D Interactive Background -->
    <canvas id="bg-canvas"></canvas>

    <main class="hero-section">
        <div class="auth-wrapper">
            <div class="auth-container">
                <div class="auth-header">
                    <h1 class="auth-title">Weather Predictor</h1>
                    <p class="auth-subtitle">Discover real-time weather & secure your ultimate forecast.</p>
                </div>
                
                <div class="auth-tabs">
                    <div class="auth-tab active" id="tab-login">Login</div>
                    <div class="auth-tab" id="tab-signup">Sign Up</div>
                </div>

                <!-- Login Form -->
                <form class="auth-form active" id="form-login">
                    <div id="login-error" style="color: #fca5a5; font-size: 0.9rem; text-align: center; display: none; background: rgba(220,38,38,0.2); padding: 8px; border-radius: 8px;"></div>
                    <div class="input-group">
                        <input type="email" id="login-email" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="login-password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="submit-btn">Sign In</button>
                </form>

                <!-- Sign Up Form -->
                <form class="auth-form" id="form-signup">
                    <div id="signup-error" style="color: #fca5a5; font-size: 0.9rem; text-align: center; display: none; background: rgba(220,38,38,0.2); padding: 8px; border-radius: 8px;"></div>
                    <div id="signup-success" style="color: #86efac; font-size: 0.9rem; text-align: center; display: none; background: rgba(22,163,74,0.2); padding: 8px; border-radius: 8px;"></div>
                    <div class="input-group">
                        <input type="text" id="signup-name" placeholder="Full Name" required>
                    </div>
                    <div class="input-group">
                        <input type="email" id="signup-email" placeholder="Email Address" required>
                    </div>
                    <div class="input-group">
                        <input type="password" id="signup-password" placeholder="Create Password" required minlength="8" pattern="^(?=.*[A-Z])(?=.*\d)(?=.*[^a-zA-Z0-9]).{8,}$" title="Password must be at least 8 characters long, contain at least one uppercase letter, one number, and one special character.">
                    </div>
                    <button type="submit" class="submit-btn">Create Account</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Auth Toggle Logic and Backend Integration -->
    <script>
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const formLogin = document.getElementById('form-login');
        const formSignup = document.getElementById('form-signup');
        
        function switchTab(toSignup) {
            if (toSignup) {
                tabSignup.classList.add('active');
                tabLogin.classList.remove('active');
                formSignup.classList.add('active');
                formLogin.classList.remove('active');
            } else {
                tabLogin.classList.add('active');
                tabSignup.classList.remove('active');
                formLogin.classList.add('active');
                formSignup.classList.remove('active');
            }
        }

        tabLogin.addEventListener('click', () => switchTab(false));
        tabSignup.addEventListener('click', () => switchTab(true));

        // Use standard root relative url or local flask backend
        const BASE_URL = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
            ? 'http://localhost:5000/api'
            : 'https://weather-predictor-proxy.onrender.com/api';

        // Handle Login
        formLogin.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            
            try {
                const response = await fetch(`${BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    // Set auth state so we don't instantly redirect back on load
                    sessionStorage.setItem('auth_success', 'true');
                    sessionStorage.setItem('user_email', email);
                    window.location.href = 'home.html';
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                    // Auto‑hide the error after a few seconds to avoid lingering UI blocks
                    setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
                    if (data.message.includes('sign up first')) {
                        setTimeout(() => {
                            switchTab(true);
                            document.getElementById('signup-email').value = email;
                            errorDiv.style.display = 'none';
                        }, 1500);
                    }
                }
            } catch (error) {
                errorDiv.textContent = 'Unable to connect to authentication server. Please try again later.';
                errorDiv.style.display = 'block';
                setTimeout(() => { errorDiv.style.display = 'none'; }, 5000);
            }
        });

        // Handle Signup
        formSignup.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            const errorDiv = document.getElementById('signup-error');
            const successDiv = document.getElementById('signup-success');
            
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            try {
                const response = await fetch(`${BASE_URL}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    successDiv.textContent = 'Account created! Logging you in...';
                    successDiv.style.display = 'block';
                    // Simulate immediate login
                    setTimeout(() => {
                        sessionStorage.setItem('auth_success', 'true');
                        sessionStorage.setItem('user_email', email);
                        window.location.href = 'home.html';
                    }, 1500);
                } else {
                    errorDiv.textContent = data.message;
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = 'Unable to connect to authentication server. Please try again later.';
                errorDiv.style.display = 'block';
            }
        });
    </script>

    <!-- Import Three.js core and add-ons from CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        
        const canvas = document.getElementById('bg-canvas');
        const scene = new THREE.Scene();
        
        const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 0);
        
        const renderer = new THREE.WebGLRenderer({ canvas, alpha: false, antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.0;
        
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xffffff, 0.5);
        mainLight.position.set(5, 10, 7);
        scene.add(mainLight);
        
        const textureLoader = new THREE.TextureLoader();
        const mountainTexture = textureLoader.load('clear_mountain_bg.png');
        
        mountainTexture.generateMipmaps = false;
        mountainTexture.minFilter = THREE.LinearFilter;
        mountainTexture.magFilter = THREE.LinearFilter;
        mountainTexture.anisotropy = renderer.capabilities.getMaxAnisotropy();
        
        const sphereGeometry = new THREE.SphereGeometry(100, 64, 40);
        sphereGeometry.scale(-1, 1, 1);
        
        const sphereMaterial = new THREE.MeshBasicMaterial({
            map: mountainTexture
        });
        
        const mountainSphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
        scene.add(mountainSphere);
        
        const particleCount = 2000;
        const particlesGeometry = new THREE.BufferGeometry();
        const posArray = new Float32Array(particleCount * 3);
        const colorArray = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount; i++) {
            const x = (Math.random() - 0.5) * 80;
            const y = (Math.random() - 0.5) * 80;
            const z = (Math.random() - 0.5) * 80;
            
            posArray[i*3] = x;
            posArray[i*3+1] = y;
            posArray[i*3+2] = z;
            
            colorArray[i*3] = 0.8 + Math.random() * 0.2;
            colorArray[i*3+1] = 0.9 + Math.random() * 0.1;
            colorArray[i*3+2] = 1.0;
        }
        particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.2,
            vertexColors: true,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        const particleSystem = new THREE.Points(particlesGeometry, particleMaterial);
        scene.add(particleSystem);
        
        let mouseX = 0;
        let mouseY = 0;
        let targetRotationX = 0;
        let targetRotationY = 0;
        let currentRotX = 0;
        let currentRotY = 0;
        
        window.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = (event.clientY / window.innerHeight) * 2 - 1;
            
            targetRotationY = mouseX * 0.5;
            targetRotationX = mouseY * 0.3;
        });
        
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.005;
            
            currentRotX += (targetRotationX - currentRotX) * 0.06;
            currentRotY += (targetRotationY - currentRotY) * 0.06;
            
            camera.rotation.order = 'YXZ';
            camera.rotation.x = -currentRotX;
            camera.rotation.y = -currentRotY;
            
            camera.position.x = mouseX * 2.0;
            camera.position.y = -mouseY * 1.5;
            
            particleSystem.position.y = Math.sin(time * 0.5) * 3;
            particleSystem.position.x = Math.cos(time * 0.3) * 2;
            particleSystem.rotation.y = time * 0.05;
            particleSystem.rotation.z = Math.sin(time * 0.2) * 0.02;
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', onWindowResize, false);
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
